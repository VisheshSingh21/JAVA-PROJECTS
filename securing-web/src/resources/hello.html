<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>My Profile</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
        textarea { width: 100%; height: 200px; padding: 10px; font-size: 14px; }
        button { margin-top: 10px; padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        .saved-msg { color: green; margin-top: 10px; }
        .logout-btn { background: #f44336; float: right; }
    </style>
</head>
<body>

<form th:action="@{/logout}" method="post" style="text-align:right">
    <span sec:authentication="name" style="margin-right:10px; font-weight:bold"></span>
    <input type="submit" value="Sign Out" style="background:#f44336; color:white; border:none; padding:8px 15px; cursor:pointer"/>
</form>

<h2>👤 My Profile</h2>

<div th:if="${saved}" class="saved-msg">✅ Bio saved successfully!</div>

<form th:action="@{/savebio}" method="post">
    <label><b>Write about yourself:</b></label><br/><br/>
    <textarea name="bio" placeholder="Tell us about yourself...">[[${bio}]]</textarea><br/>
    <button type="submit">💾 Save</button>
</form>

</body>
</html>
